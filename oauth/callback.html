<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>OAuth Callback — Castro e Souza Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body{ font-family: Arial, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; color: #222; line-height: 1.6; text-align: center; }
  .code-box{ font-size: 18px; word-break: break-all; background: #f3f3f3; border-radius: 8px; padding: 16px; margin: 20px 0; }
  button{ font-size: 16px; padding: 10px 20px; border-radius: 8px; border: none; background: #C8102E; color: white; cursor: pointer; }
</style>
</head>
<body>
  <h1>Autorização recebida</h1>
  <p>Copie o código abaixo e envie de volta:</p>
  <div class="code-box" id="code">—</div>
  <button onclick="copyCode()">Copiar código</button>
  <p id="copied" style="display:none; color: green;">Copiado!</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code') || '(nenhum código encontrado na URL)';
    document.getElementById('code').textContent = code;
    function copyCode() {
      navigator.clipboard.writeText(code);
      document.getElementById('copied').style.display = 'block';
    }
  </script>
</body>
</html>
